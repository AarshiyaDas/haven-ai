<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haven</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0effe; color: #1a1a1a; min-height: 100vh; }
        @keyframes orb-float { 0%,100%{transform:translate(0,0) rotate(0deg)} 33%{transform:translate(8px,-12px) rotate(8deg)} 66%{transform:translate(-8px,6px) rotate(-6deg)} }
        @keyframes blob1 { 0%,100%{border-radius:60% 40% 30% 70%/60% 30% 70% 40%} 50%{border-radius:30% 60% 70% 40%/50% 60% 30% 60%} }
        @keyframes blob2 { 0%,100%{border-radius:40% 60% 60% 40%/60% 30% 70% 40%} 50%{border-radius:60% 40% 30% 70%/40% 70% 30% 60%} }
        @keyframes blob3 { 0%,100%{border-radius:50% 50% 40% 60%/40% 60% 50% 50%} 50%{border-radius:40% 60% 60% 40%/60% 40% 40% 60%} }
        @keyframes cursor-blink { 0%,100%{opacity:1} 50%{opacity:0} }
        @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.3} }
        @keyframes slide-in { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

        header { padding: 18px 24px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 22px; font-weight: 800; color: #1a1a1a; letter-spacing: -0.5px; }
        .logo-sub { font-size: 12px; color: #888; margin-top: 2px; }
        .status-badge { display: flex; align-items: center; gap: 6px; background: #E1F5EE; border-radius: 999px; padding: 6px 14px; font-size: 11px; font-weight: 600; color: #0F6E56; }
        .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #1D9E75; animation: pulse-dot 2s infinite; }

        .main { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; padding: 0 24px 24px; height: calc(100vh - 80px); }
        .left-panel, .right-panel { display: flex; flex-direction: column; gap: 14px; overflow: hidden; }

        .card { background: #fff; border-radius: 16px; padding: 18px; border: 0.5px solid #e0daf8; }
        .card-label { font-size: 11px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }

        .orb-container { background: #f0effe; border-radius: 12px; aspect-ratio: 4/3; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        .orb-wrap { position: relative; width: 160px; height: 160px; animation: orb-float 6s ease-in-out infinite; }
        .blob { position: absolute; }
        .b1 { width: 110px; height: 110px; background: #a8d8ea; top: 10px; left: 15px; animation: blob1 8s ease-in-out infinite; }
        .b2 { width: 95px; height: 95px; background: #c7b8ea; top: 35px; left: 55px; animation: blob2 10s ease-in-out infinite; opacity: 0.85; }
        .b3 { width: 85px; height: 85px; background: #b8e8d0; top: 65px; left: 25px; animation: blob3 7s ease-in-out infinite; opacity: 0.75; }
        .b4 { width: 75px; height: 75px; background: #f9c784; top: 15px; left: 75px; animation: blob1 9s ease-in-out infinite reverse; opacity: 0.55; }
        .orb-label { position: absolute; bottom: 8px; font-size: 10px; color: #aaa; }

        .btn-pill { border-radius: 999px; border: 1.5px solid #c4bdf0; background: transparent; padding: 9px 22px; font-size: 13px; font-weight: 500; cursor: pointer; color: #534AB7; transition: all 0.2s; width: 100%; margin-top: 10px; }
        .btn-pill:hover { background: #534AB7; color: #fff; border-color: #534AB7; }
        .btn-fill { border-radius: 999px; border: none; background: #534AB7; padding: 9px 22px; font-size: 13px; font-weight: 500; cursor: pointer; color: #fff; width: 100%; margin-top: 10px; transition: all 0.2s; }
        .btn-fill:hover { background: #3C3489; }
        .btn-fill:disabled { background: #c4bdf0; cursor: not-allowed; }
        .btn-danger { border-radius: 999px; border: 1.5px solid #f09595; background: transparent; padding: 9px 22px; font-size: 13px; font-weight: 500; cursor: pointer; color: #A32D2D; transition: all 0.2s; flex: 1; }
        .btn-danger:hover { background: #A32D2D; color: #fff; }

        textarea { width: 100%; background: #fff; border: 0.5px solid #d8d3f0; border-radius: 12px; padding: 10px 14px; font-size: 13px; color: #1a1a1a; resize: none; height: 72px; font-family: inherit; outline: none; }
        textarea:focus { border-color: #534AB7; }

        .chat-header { margin-bottom: 14px; }
        .chat-title { font-size: 22px; font-weight: 800; color: #1a1a1a; letter-spacing: -1px; line-height: 1.15; }

        #chat-messages { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 9px; padding-right: 4px; margin-bottom: 12px; }
        .message { animation: slide-in 0.3s ease; }
        .message.user { display: flex; justify-content: flex-end; }
        .message.assistant { display: flex; justify-content: flex-start; }
        .message.system { display: flex; justify-content: center; }
        .bubble-ai { background: #fff; border-radius: 18px 18px 18px 4px; padding: 11px 15px; font-size: 13px; color: #2d2d4e; max-width: 88%; line-height: 1.6; border: 0.5px solid #e0daf8; }
        .bubble-user { background: #534AB7; border-radius: 18px 18px 4px 18px; padding: 11px 15px; font-size: 13px; color: #fff; max-width: 88%; line-height: 1.6; }
        .bubble-system { background: transparent; border: 1px dashed #c4bdf0; border-radius: 999px; padding: 5px 14px; font-size: 11px; color: #888; }
        .cursor { display: inline-block; width: 2px; height: 12px; background: #534AB7; vertical-align: middle; animation: cursor-blink 1s infinite; margin-left: 2px; }

        .input-row { display: flex; gap: 8px; align-items: center; }
        #message-input { flex: 1; background: #fff; border: 0.5px solid #d8d3f0; border-radius: 999px; padding: 10px 18px; font-size: 13px; color: #1a1a1a; font-family: inherit; outline: none; }
        #message-input:focus { border-color: #534AB7; }
        .mic-btn { width: 38px; height: 38px; border-radius: 50%; background: #f0effe; border: 0.5px solid #d8d3f0; color: #534AB7; font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .mic-btn.recording { background: #ff4757; color: #fff; }
        .send-btn { width: 38px; height: 38px; border-radius: 50%; background: #534AB7; border: none; color: #fff; font-size: 16px; cursor: pointer; flex-shrink: 0; transition: all 0.2s; }
        .send-btn:hover { background: #3C3489; }
        .send-btn:disabled { background: #c4bdf0; cursor: not-allowed; }

        .report-card { background: #EEEDFE; border-radius: 16px; padding: 16px; border: 0.5px solid #CECBF6; }
        .report-label { font-size: 11px; font-weight: 600; color: #534AB7; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
        #report-content { font-size: 12px; color: #3C3489; line-height: 1.6; white-space: pre-wrap; max-height: 120px; overflow-y: auto; }
        .report-btns { display: flex; gap: 8px; margin-top: 10px; }

        .alert-banner { display: none; background: #EEEDFE; border: 1px solid #534AB7; border-radius: 12px; padding: 10px 14px; font-size: 13px; color: #3C3489; margin-bottom: 4px; }
        .alert-banner.show { display: block; animation: slide-in 0.3s ease; }

        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-thumb { background: #c4bdf0; border-radius: 2px; }

        .chat-wrapper { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    </style>
</head>
<body>

<header>
    <div>
        <div class="logo">Haven</div>
        <div class="logo-sub">Your calm in the storm</div>
    </div>
    <div class="status-badge">
        <div class="status-dot" id="status-dot"></div>
        <span id="status-text">AI ready</span>
    </div>
</header>

<div class="main">
    <div class="left-panel">
        <div class="card">
            <div class="card-label">Environment view</div>
            <div class="orb-container" id="camera-container">
                <div class="orb-wrap" id="orb">
                    <div class="blob b1"></div>
                    <div class="blob b2"></div>
                    <div class="blob b3"></div>
                    <div class="blob b4"></div>
                </div>
                <video id="camera-feed" autoplay muted playsinline style="display:none; width:100%; height:100%; object-fit:cover; border-radius:12px;"></video>
                <div class="orb-label" id="orb-label">camera preview</div>
            </div>
            <button class="btn-pill" id="camera-btn" onclick="toggleCamera()">Start camera</button>
        </div>

        <div class="card">
            <div class="card-label">Your schedule today</div>
            <textarea id="schedule-input" placeholder="2pm — Final exam&#10;4pm — Team standup&#10;6pm — Doctor appointment"></textarea>
            <button class="btn-fill" onclick="saveSchedule()">Save schedule</button>
        </div>
    </div>

    <div class="right-panel">
        <div class="alert-banner" id="alert-banner"></div>

        <div class="card chat-wrapper">
            <div class="chat-header">
                <div class="chat-title">Tell me how<br>you really feel.</div>
            </div>
            <div id="chat-messages">
                <div class="message assistant">
                    <div class="bubble-ai">Hi, I'm Haven. I'm here with you. What's on your mind right now?</div>
                </div>
            </div>
            <div class="input-row">
                <input type="text" id="message-input" placeholder="Type how you're feeling..." onkeypress="if(event.key==='Enter') sendMessage()"/>
                <button class="mic-btn" id="mic-btn" onclick="toggleMic()">🎤</button>
                <button class="send-btn" id="send-btn" onclick="sendMessage()">→</button>
            </div>
        </div>

        <div class="report-card">
            <div class="report-label">Session report</div>
            <div id="report-content">Your therapist-ready summary appears here after your session ends.</div>
            <div class="report-btns">
                <button class="btn-pill" style="margin-top:0; flex:1;" onclick="generateReport()">Generate report</button>
                <button class="btn-danger" onclick="resetSession()">Reset</button>
            </div>
        </div>
    </div>
</div>

<script>
let cameraActive=false,mediaStream=null,isRecording=false,recognition=null,isStreaming=false;

async function toggleCamera(){
    if(!cameraActive){
        try{
            mediaStream=await navigator.mediaDevices.getUserMedia({video:true,audio:false});
            const feed=document.getElementById('camera-feed');
            feed.srcObject=mediaStream;
            feed.style.display='block';
            document.getElementById('orb').style.display='none';
            document.getElementById('orb-label').style.display='none';
            document.getElementById('camera-btn').textContent='Stop camera';
            document.getElementById('status-dot').style.background='#1D9E75';
            document.getElementById('status-text').textContent='Camera active';
            cameraActive=true;
        }catch(e){addMessage('system','Camera access denied.');}
    }else{
        mediaStream.getTracks().forEach(t=>t.stop());
        document.getElementById('camera-feed').style.display='none';
        document.getElementById('orb').style.display='block';
        document.getElementById('orb-label').style.display='block';
        document.getElementById('camera-btn').textContent='Start camera';
        document.getElementById('status-text').textContent='AI ready';
        cameraActive=false;
    }
}

function captureFrame(){
    if(!cameraActive)return null;
    const video=document.getElementById('camera-feed');
    const canvas=document.createElement('canvas');
    canvas.width=video.videoWidth;canvas.height=video.videoHeight;
    canvas.getContext('2d').drawImage(video,0,0);
    return canvas.toDataURL('image/jpeg',0.8);
}

async function saveSchedule(){
    const schedule=document.getElementById('schedule-input').value;
    if(!schedule.trim())return;
    await fetch('/api/schedule',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({schedule})});
    addMessage('system','Schedule saved — Haven will check in before stressful events');
    setInterval(()=>checkAlerts(schedule),60000);
    checkAlerts(schedule);
}

function checkAlerts(schedule){
    const now=new Date();
    const curr=now.getHours()*60+now.getMinutes();
    schedule.split('\n').forEach(line=>{
        const m=line.match(/(\d{1,2})(?::(\d{2}))?\s*(am|pm)?/i);
        if(!m)return;
        let h=parseInt(m[1]),min=parseInt(m[2]||'0'),mer=m[3];
        if(mer&&mer.toLowerCase()==='pm'&&h!==12)h+=12;
        if(mer&&mer.toLowerCase()==='am'&&h===12)h=0;
        const diff=(h*60+min)-curr;
        if(diff>25&&diff<=30){
            const event=line.replace(m[0],'').replace('-','').replace('—','').trim();
            const banner=document.getElementById('alert-banner');
            banner.textContent=`⏰ "${event}" in 30 minutes — want a quick breathing reset?`;
            banner.classList.add('show');
            setTimeout(()=>banner.classList.remove('show'),10000);
            addMessage('assistant',`I noticed you have "${event}" coming up in 30 minutes. How are you feeling about it? Want to do a quick grounding exercise together?`);
        }
    });
}

async function sendMessage(){
    if(isStreaming)return;
    const input=document.getElementById('message-input');
    const message=input.value.trim();
    if(!message)return;
    input.value='';
    addMessage('user',message);
    const imageData=captureFrame();
    isStreaming=true;
    document.getElementById('send-btn').disabled=true;
    document.getElementById('status-text').textContent='Haven is thinking...';

    const streamDiv=document.createElement('div');
    streamDiv.className='message assistant';
    const bubble=document.createElement('div');
    bubble.className='bubble-ai';
    const cursor=document.createElement('span');
    cursor.className='cursor';
    bubble.appendChild(cursor);
    streamDiv.appendChild(bubble);
    document.getElementById('chat-messages').appendChild(streamDiv);
    document.getElementById('chat-messages').scrollTop=document.getElementById('chat-messages').scrollHeight;

    let fullText='';
    try{
        const response=await fetch('/api/chat',{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({message,image:imageData})
        });
        const reader=response.body.getReader();
        const decoder=new TextDecoder();
        while(true){
            const{done,value}=await reader.read();
            if(done)break;
            const chunk=decoder.decode(value);
            const lines=chunk.split('\n');
            for(const line of lines){
                if(line.startsWith('data: ')){
                    try{
                        const data=JSON.parse(line.slice(6));
                        if(data.token){
                            fullText+=data.token;
                            bubble.textContent=fullText;
                            bubble.appendChild(cursor);
                            document.getElementById('chat-messages').scrollTop=document.getElementById('chat-messages').scrollHeight;
                        }
                        if(data.done){
                            cursor.remove();
                            speak(fullText);
                        }
                    }catch(e){}
                }
            }
        }
    }catch(e){
        bubble.textContent='Something went wrong. Please try again.';
        cursor.remove();
    }
    isStreaming=false;
    document.getElementById('send-btn').disabled=false;
    document.getElementById('status-text').textContent='AI ready';
}

function addMessage(role,content){
    const c=document.getElementById('chat-messages');
    const wrapper=document.createElement('div');
    wrapper.className=`message ${role}`;
    const bubble=document.createElement('div');
    if(role==='user') bubble.className='bubble-user';
    else if(role==='assistant') bubble.className='bubble-ai';
    else bubble.className='bubble-system';
    bubble.textContent=content;
    wrapper.appendChild(bubble);
    c.appendChild(wrapper);
    c.scrollTop=c.scrollHeight;
}

function speak(text){
    if(!window.speechSynthesis)return;
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.rate=0.85;u.pitch=1.0;
    const voices=window.speechSynthesis.getVoices();
    const preferred=voices.find(v=>v.name.includes('Google')&&v.lang==='en-US');
    if(preferred)u.voice=preferred;
    window.speechSynthesis.speak(u);
}

function toggleMic(){
    if(!('webkitSpeechRecognition' in window||'SpeechRecognition' in window)){
        addMessage('system','Use Chrome for voice input');return;
    }
    if(isRecording){recognition.stop();isRecording=false;document.getElementById('mic-btn').classList.remove('recording');return;}
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    recognition=new SR();recognition.continuous=false;recognition.lang='en-US';
    recognition.onresult=e=>{document.getElementById('message-input').value=e.results[0][0].transcript;sendMessage();};
    recognition.onend=()=>{isRecording=false;document.getElementById('mic-btn').classList.remove('recording');};
    recognition.start();isRecording=true;document.getElementById('mic-btn').classList.add('recording');
}

async function generateReport(){
    document.getElementById('report-content').textContent='Generating your report...';
    try{
        const r=await fetch('/api/report',{method:'POST'});
        const d=await r.json();
        document.getElementById('report-content').textContent=d.report;
    }catch(e){
        document.getElementById('report-content').textContent='Error generating report.';
    }
}

async function resetSession(){
    await fetch('/api/reset',{method:'POST'});
    document.getElementById('chat-messages').innerHTML='<div class="message assistant"><div class="bubble-ai">Session reset. I\'m here whenever you\'re ready.</div></div>';
    document.getElementById('report-content').textContent='Your therapist-ready summary appears here after your session ends.';
}

window.speechSynthesis.onvoiceschanged=()=>window.speechSynthesis.getVoices();
</script>
</body>
</html>
